<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEATWORK 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-info bg-gradient d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4 rounded-4" style="width: 350px;">
        <h1 class="text-center mb-4">LOG IN</h1>

        <form onsubmit="authenticate(); return false;">
            <div class="mb-3 fw-bold">
                <label class="form-label">Username</label>
                <input type="text" id="uname" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3 fw-bold">
                <label class="form-label">Password</label>
                <input type="password" id="pword" class="form-control" placeholder="Enter Password" required>
            </div>

            <div class="form-check mb-3 mt-2">
                <input class="form-check-input" type="checkbox" id="confirmation" onclick="stayLoggedIn()">
                <label class="form-check-label" for="confirmation">Stay logged in</label>
            </div>

            <div class="d-grid">
                <input type="submit" value="Login" class="btn btn-primary">
            </div>
        </form>
    </div>

    <script>
    let attempts = 0;

    function stayLoggedIn() {
        if (document.getElementById(" confirmation ").checked) {
            alert("Your session will stay active on this device.");
        }
    }

    function authenticate() {
        if (attempts >= 3) {
            alert("Too many failed attempts. Access denied.");
            return;
        }

        var username = document.getElementById('uname').value;
        var pword = document.getElementById('pword').value;

        if (username === 'sabitsample' && pword === 'sabitsample') {
            alert("Welcome " + username);
            document.getElementById(window.location.href = "vn.html");
            attempts = 0; 
        } else {
            attempts++;

            if (attempts >= 3) {
                alert("Too many failed attempts. You are locked out.");
            } else {
                alert("Invalid login. Attempts left: " + (3 - attempts));
            }
        }
    }
</script>
</body>
</html>
